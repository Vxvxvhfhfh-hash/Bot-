name: 🚀 Deploy to Vercel

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: 📚 Install dependencies
      run: npm ci
      
    - name: 🔍 Lint code
      run: |
        npx eslint api/**/*.js || echo "ESLint warnings found"
        
    - name: 🧪 Run tests
      run: |
        # Test si les fichiers principaux existent
        test -f vercel.json || (echo "❌ vercel.json manquant" && exit 1)
        test -f api/status.js || (echo "❌ api/status.js manquant" && exit 1)
        test -f api/webhook.js || (echo "❌ api/webhook.js manquant" && exit 1)
        test -f api/generate-response.js || (echo "❌ api/generate-response.js manquant" && exit 1)
        test -f api/health.js || (echo "❌ api/health.js manquant" && exit 1)
        echo "✅ Tous les fichiers API sont présents"
        
    - name: 🏗️ Test build
      run: npm run build

  deploy-preview:
    name: 🔍 Deploy Preview
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: 📚 Install dependencies
      run: npm ci
      
    - name: 🚀 Deploy to Vercel (Preview)
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        scope: ${{ secrets.VERCEL_ORG_ID }}
        
    - name: 🧪 Test Preview Deployment
      if: success()
      run: |
        sleep 30  # Attendre que le déploiement soit prêt
        node test-vercel-apis.js ${{ steps.deploy.outputs.preview-url }} || echo "⚠️ Tests de preview échoués"
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

  deploy-production:
    name: 🌟 Deploy Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: 📚 Install dependencies
      run: npm ci
      
    - name: 🚀 Deploy to Vercel (Production)
      id: deploy
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        vercel-args: '--prod'
        scope: ${{ secrets.VERCEL_ORG_ID }}
        
    - name: 🧪 Test Production Deployment
      if: success()
      run: |
        sleep 30  # Attendre que le déploiement soit prêt
        node test-vercel-apis.js ${{ steps.deploy.outputs.preview-url }}
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        
    - name: 📊 Comment PR with deployment info
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `🎭 **Bot WhatsApp RP Déployé!**
            
            🚀 **Production:** ${{ steps.deploy.outputs.preview-url }}
            📊 **Status:** ${{ steps.deploy.outputs.preview-url }}/api/status
            🏥 **Health:** ${{ steps.deploy.outputs.preview-url }}/api/health
            
            ✨ Le bot est maintenant accessible et fonctionnel !`
          })

  notify:
    name: 📢 Notifications
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always()
    
    steps:
    - name: 🎉 Success notification
      if: needs.deploy-production.result == 'success'
      run: |
        echo "✅ Déploiement réussi!"
        echo "🎭 Bot WhatsApp RP opérationnel sur Vercel"
        
    - name: ❌ Failure notification
      if: needs.deploy-production.result == 'failure'
      run: |
        echo "❌ Échec du déploiement"
        echo "🔍 Vérifiez les logs pour plus de détails"